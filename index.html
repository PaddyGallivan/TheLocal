<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Local — Williamstown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f0ebe0;
    --card: #ffffff;
    --dark: #1a1a1a;
    --amber: #c8973a;
    --amber-light: #f0b429;
    --cream: #faf7f2;
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --border: #e8e2d8;
    --green: #2d7a4f;
    --red: #c0392b;
    --blue: #2563eb;
    --kudos: #f0b429;
  }
  html, body { height: 100%; background: #d4cfc5; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

  /* App shell */
  #app {
    width: 100%; max-width: 430px; min-height: 100vh;
    background: var(--bg); position: relative;
    display: flex; flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
  }

  /* Header */
  .header {
    background: var(--card); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-size: 20px; font-weight: 300; color: var(--dark); letter-spacing: -0.5px; }
  .header-logo span { font-style: italic; color: var(--amber); font-weight: 600; }
  .header-suburb {
    display: flex; align-items: center; gap: 5px;
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px; font-size: 13px; color: var(--text2); cursor: pointer;
  }
  .header-suburb::before { content: '📍'; font-size: 11px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--amber); color: white; font-weight: 700; font-size: 15px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }

  /* Main layout */
  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .content {
    flex: 1; overflow-y: auto; padding: 0; position: relative;
  }

  /* Screens */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; }

  /* Home screen */
  .screen-home {
    flex-direction: column;
  }
  .feed { flex: 1; overflow-y: auto; padding: 12px; gap: 12px; display: flex; flex-direction: column; }
  .feed-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; cursor: pointer; transition: all 0.2s;
  }
  .feed-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .feed-item-header {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;
  }
  .feed-item-title { font-weight: 600; color: var(--dark); font-size: 15px; }
  .feed-item-meta { font-size: 12px; color: var(--text3); }
  .feed-item-preview { font-size: 13px; color: var(--text2); line-height: 1.4; margin: 8px 0; }
  .feed-item-footer {
    display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  }
  .feed-item-action {
    display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3);
    cursor: pointer; padding: 2px; border-radius: 4px;
  }
  .feed-item-action:hover { background: var(--cream); color: var(--text2); }

  /* Kudos/Hearts */
  .kudos-count { color: var(--kudos); font-weight: 600; }

  /* Detail screen */
  .detail-header {
    padding: 16px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .detail-title { font-size: 18px; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
  .detail-meta { font-size: 13px; color: var(--text2); }
  .detail-content {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .detail-content p { margin-bottom: 12px; color: var(--text); line-height: 1.6; }
  .detail-content h3 { margin-top: 16px; margin-bottom: 8px; color: var(--dark); font-size: 15px; }

  /* Comments section */
  .comments-section {
    padding: 12px; background: var(--cream); border-top: 1px solid var(--border);
  }
  .comment {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; margin-bottom: 8px; font-size: 13px;
  }
  .comment-author { font-weight: 600; color: var(--dark); font-size: 12px; margin-bottom: 4px; }
  .comment-text { color: var(--text); }

  /* Create Post */
  .create-area {
    padding: 14px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .create-input {
    width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 13px; resize: none; min-height: 60px;
  }
  .create-buttons {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .btn {
    padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary {
    background: var(--amber); color: white;
  }
  .btn-primary:hover {
    background: #b88730; box-shadow: 0 2px 6px rgba(200,151,58,0.3);
  }
  .btn-secondary {
    background: var(--border); color: var(--text2);
  }
  .btn-secondary:hover { background: #e0dace; }

  /* Search */
  .search-area {
    padding: 12px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 13px;
  }

  /* Navigation */
  .nav-bar {
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding: 10px 0;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; padding: 8px 12px; font-size: 11px; color: var(--text3);
    border-radius: 6px; transition: all 0.2s;
  }
  .nav-item.active {
    color: var(--amber); font-weight: 600;
  }
  .nav-item:hover { background: var(--cream); }
  .nav-icon { font-size: 20px; }

  /* Modal */
  .modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); justify-content: center; align-items: center;
    z-index: 1000;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: var(--card); border-radius: 12px; padding: 20px;
    max-width: 90%; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal-close {
    float: right; cursor: pointer; font-size: 20px; color: var(--text3);
    background: none; border: none; padding: 0;
  }
  .modal-close:hover { color: var(--dark); }

  /* Loading state */
  .loading { text-align: center; padding: 20px; color: var(--text3); }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--amber);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 480px) {
    .modal-content { max-width: 95%; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      The <span>Local</span>
    </div>
    <div class="header-suburb" onclick="showModal('locationModal')">
      Williamstown
    </div>
    <div class="avatar" onclick="showModal('profileModal')">A</div>
  </div>

  <div class="main">
    <div class="content">
      <!-- Home Screen -->
      <div class="screen screen-home active">
        <div class="create-area">
          <textarea class="create-input" id="newPost" placeholder="What's happening in Williamstown?"></textarea>
          <div class="create-buttons">
            <button class="btn btn-primary" onclick="createPost()">Post</button>
            <button class="btn btn-secondary" onclick="cancelPost()">Cancel</button>
          </div>
        </div>
        <div class="feed" id="feed">
          <!-- Feed items will be inserted here -->
        </div>
      </div>

      <!-- Detail Screen -->
      <div class="screen screen-detail">
        <div class="detail-header">
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-meta" id="detailMeta"></div>
        </div>
        <div class="detail-content" id="detailContent"></div>
        <div class="comments-section" id="commentsSection">
          <!-- Comments will be inserted here -->
        </div>
      </div>

      <!-- Search Screen -->
      <div class="screen screen-search">
        <div class="search-area">
          <input type="text" class="search-input" id="searchInput"
                 placeholder="Search posts..." onkeyup="handleSearch()">
        </div>
        <div class="feed" id="searchResults">
          <!-- Search results will be inserted here -->
        </div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-item active" onclick="showScreen('home')">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="showScreen('search')">
      <span class="nav-icon">🔍</span>
      <span>Search</span>
    </div>
    <div class="nav-item" onclick="showModal('notificationsModal')">
      <span class="nav-icon">🔔</span>
      <span>Alerts</span>
    </div>
    <div class="nav-item" onclick="showModal('profileModal')">
      <span class="nav-icon">👤</span>
      <span>Profile</span>
    </div>
  </div>
</div>

<!-- Location Modal -->
<div class="modal" id="locationModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('locationModal')">&times;</button>
    <h2>Select Location</h2>
    <div style="margin-top: 12px;">
      <div style="padding: 10px; cursor: pointer; border-radius: 6px;" onclick="selectLocation('Williamstown')">
        Williamstown
      </div>
      <div style="padding: 10px; cursor: pointer; border-radius: 6px;" onclick="selectLocation('Footscray')">
        Footscray
      </div>
      <div style="padding: 10px; cursor: pointer; border-radius: 6px;" onclick="selectLocation('Seddon')">
        Seddon
      </div>
    </div>
  </div>
</div>

<!-- Notifications Modal -->
<div class="modal" id="notificationsModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('notificationsModal')">&times;</button>
    <h2>Notifications</h2>
    <div style="margin-top: 12px;">
      <div style="padding: 10px; background: var(--cream); border-radius: 6px; margin-bottom: 8px;">
        <div style="font-weight: 600; font-size: 13px;">Alex liked your post</div>
        <div style="font-size: 12px; color: var(--text3);">2 hours ago</div>
      </div>
      <div style="padding: 10px; background: var(--cream); border-radius: 6px; margin-bottom: 8px;">
        <div style="font-weight: 600; font-size: 13px;">Jordan replied to your comment</div>
        <div style="font-size: 12px; color: var(--text3);">4 hours ago</div>
      </div>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal" id="profileModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('profileModal')">&times;</button>
    <div style="text-align: center;">
      <div style="width: 60px; height: 60px; background: var(--amber); border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: 700;">
        A
      </div>
      <div style="font-size: 16px; font-weight: 600; margin: 10px 0;">Alex</div>
      <div style="font-size: 13px; color: var(--text3); margin-bottom: 15px;">@alex • Williamstown</div>
      <div style="text-align: left; margin: 15px 0;">
        <div style="font-size: 13px; margin-bottom: 8px;"><strong>Posts:</strong> 24</div>
        <div style="font-size: 13px; margin-bottom: 8px;"><strong>Followers:</strong> 156</div>
        <div style="font-size: 13px;"><strong>Following:</strong> 89</div>
      </div>
      <button class="btn btn-secondary" style="width: 100%; margin-top: 15px;" onclick="closeModal('profileModal')">
        Close
      </button>
    </div>
  </div>
</div>

<script>
// Sample data
const posts = [
  {
    id: 1,
    author: 'Sarah',
    avatar: 'S',
    content: 'Just discovered this amazing new coffee place on Civic Parade! The flat whites are incredible.',
    timestamp: '2 hours ago',
    location: 'Williamstown',
    kudos: 24,
    comments: [
      { author: 'Mike', text: 'Which one? Need to check it out!' },
      { author: 'Emma', text: 'Love that place!' }
    ]
  },
  {
    id: 2,
    author: 'John',
    avatar: 'J',
    content: 'The new community garden project is looking great. Volunteers needed next Saturday!',
    timestamp: '4 hours ago',
    location: 'Williamstown',
    kudos: 15,
    comments: []
  },
  {
    id: 3,
    author: 'Emma',
    avatar: 'E',
    content: 'Has anyone noticed the increased traffic on Douglas Street? It\'s been worse than usual lately.',
    timestamp: '6 hours ago',
    location: 'Williamstown',
    kudos: 8,
    comments: [
      { author: 'David', text: 'Yeah, I\'ve been taking alternate routes' }
    ]
  }
];

let currentLocation = 'Williamstown';

// Show/Hide screens
function showScreen(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelector(`.screen-${screen}`).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  event.target.closest('.nav-item').classList.add('active');

  if (screen === 'home') {
    renderFeed();
  }
}

// Show/Hide modals
function showModal(modalId) {
  document.getElementById(modalId).classList.add('active');
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
}

// Render feed
function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  posts.forEach(post => {
    const item = document.createElement('div');
    item.className = 'feed-item';
    item.onclick = () => showDetail(post);
    item.innerHTML = `
      <div class="feed-item-header">
        <div class="feed-item-title">${post.author}</div>
        <div class="feed-item-meta">${post.timestamp}</div>
      </div>
      <div class="feed-item-preview">${post.content}</div>
      <div class="feed-item-footer">
        <div class="feed-item-action">❤️ <span class="kudos-count">${post.kudos}</span></div>
        <div class="feed-item-action">💬 ${post.comments.length}</div>
      </div>
    `;
    feed.appendChild(item);
  });
}

// Show detail view
function showDetail(post) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelector('.screen-detail').classList.add('active');

  document.getElementById('detailTitle').textContent = post.author;
  document.getElementById('detailMeta').textContent = `${post.timestamp} • ${post.location}`;
  document.getElementById('detailContent').innerHTML = `<p>${post.content}</p>`;

  const commentsSection = document.getElementById('commentsSection');
  commentsSection.innerHTML = '<h3 style="margin-top: 0;">Comments</h3>';

  if (post.comments.length === 0) {
    commentsSection.innerHTML += '<div style="color: var(--text3); font-size: 13px;">No comments yet</div>';
  } else {
    post.comments.forEach(comment => {
      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment';
      commentDiv.innerHTML = `
        <div class="comment-author">${comment.author}</div>
        <div class="comment-text">${comment.text}</div>
      `;
      commentsSection.appendChild(commentDiv);
    });
  }

  // Scroll to top
  document.querySelector('.detail-content').scrollTop = 0;
}

// Create post
function createPost() {
  const textarea = document.getElementById('newPost');
  const content = textarea.value.trim();

  if (!content) {
    alert('Please enter some text');
    return;
  }

  const newPost = {
    id: posts.length + 1,
    author: 'Alex',
    avatar: 'A',
    content: content,
    timestamp: 'now',
    location: currentLocation,
    kudos: 0,
    comments: []
  };

  posts.unshift(newPost);
  textarea.value = '';
  renderFeed();
}

function cancelPost() {
  document.getElementById('newPost').value = '';
}

// Search
function handleSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const results = posts.filter(post =>
    post.content.toLowerCase().includes(query) ||
    post.author.toLowerCase().includes(query)
  );

  const searchResults = document.getElementById('searchResults');
  searchResults.innerHTML = '';

  results.forEach(post => {
    const item = document.createElement('div');
    item.className = 'feed-item';
    item.onclick = () => showDetail(post);
    item.innerHTML = `
      <div class="feed-item-header">
        <div class="feed-item-title">${post.author}</div>
        <div class="feed-item-meta">${post.timestamp}</div>
      </div>
      <div class="feed-item-preview">${post.content}</div>
      <div class="feed-item-footer">
        <div class="feed-item-action">❤️ <span class="kudos-count">${post.kudos}</span></div>
        <div class="feed-item-action">💬 ${post.comments.length}</div>
      </div>
    `;
    searchResults.appendChild(item);
  });
}

function selectLocation(location) {
  currentLocation = location;
  document.querySelector('.header-suburb').textContent = location;
  closeModal('locationModal');
  renderFeed();
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  renderFeed();
  showScreen('home');
});
</script>
</body>
</html>
